{% extends 'base.html' %}

{% block title %}Operatsiya qo'shish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card mt-4">
            <h3 class="mb-4 text-center">Yangi Operatsiya</h3>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-muted">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger mt-1" style="font-size: 0.85rem;">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn-neon">
                        <i class="fa-solid fa-check"></i> Saqlash
                    </button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Bekor qilish</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(function(input) {
            if(input.type !== 'checkbox' && input.type !== 'file') {
                input.classList.add('form-control');
            }
            if(input.tagName.toLowerCase() === 'select') {
                input.classList.add('form-select');
            }
        });
    });
</script>
{% endblock %}
